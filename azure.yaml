# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: arc-demo2
services:
  app:
    language: dotnet
    project: ./src/ArcDemo2.AspireHost/ArcDemo2.AspireHost.csproj
    host: containerapp

hooks:
  postdeploy:
    posix:
      shell: sh
      run: |
        if [ "$ASPNETCORE_ENVIRONMENT" = "Development" ]; then
          az containerapp ingress update \
            --name web \
            --resource-group rg-${AZURE_ENV_NAME} \
            --type external \
            --allow-insecure false \
            --target-port 8080
        fi
    windows:
      shell: pwsh
      run: |
        if ($env:ASPNETCORE_ENVIRONMENT -eq "Development") {
          az containerapp ingress update `
            --name web `
            --resource-group "rg-$env:AZURE_ENV_NAME" `
            --type external `
            --allow-insecure false `
            --target-port 8080
        }
