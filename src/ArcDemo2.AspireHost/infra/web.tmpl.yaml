api-version: 2024-02-02-preview
location: { { .Env.AZURE_LOCATION } }
identity:
  type: UserAssigned
  userAssignedIdentities:
    "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}": {}
properties:
  environmentId: { { .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID } }
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: true
      targetPort: { { targetPortOrDefault 8080 } }
      transport: http
      allowInsecure: false
    registries:
      - server: { { .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT } }
        identity: { { .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID } }
    secrets:
      - name: appdb-password
        value: '{{ securedParameter "sqlserver_password" }}'
      - name: connectionstrings--appdb
        value: Server=sqlserver,1433;User ID=sa;Password={{ securedParameter "sqlserver_password" }};TrustServerCertificate=true;Initial Catalog=AppDb
  template:
    containers:
      - image: { { .Image } }
        name: web
        env:
          - name: AZURE_CLIENT_ID
            value: { { .Env.MANAGED_IDENTITY_CLIENT_ID } }
          - name: APPDB_DATABASE
            value: AppDb
          - name: APPDB_HOST
            value: sqlserver
          - name: APPDB_JDBCCONNECTIONSTRING
            value: jdbc:sqlserver://sqlserver:1433;trustServerCertificate=true;databaseName=AppDb
          - name: APPDB_PORT
            value: "1433"
          - name: APPDB_URI
            value: mssql://sqlserver:1433/AppDb
          - name: APPDB_USERNAME
            value: sa
          - name: ASPNETCORE_ENVIRONMENT
            value: Development
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: HTTP_PORTS
            value: "{{ targetPortOrDefault 0 }}"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: APPDB_PASSWORD
            secretRef: appdb-password
          - name: ConnectionStrings__AppDb
            secretRef: connectionstrings--appdb
    scale:
      minReplicas: 1
tags:
  azd-service-name: web
  aspire-resource-name: web
